# Render Blueprint: deploys the MCP server as a free Docker web service.
# In the Render dashboard: New → Blueprint → connect this repo, and Render
# reads this file. (Or create the Web Service manually with the same settings.)
services:
  - type: web
    name: multi-agent-mcp
    runtime: docker
    dockerfilePath: ./Dockerfile.server
    plan: free
    healthCheckPath: /health
    # Render injects PORT automatically; mcp_server/server.py already reads it.
    # OPENAI_API_KEY is NOT needed by the server (only the agents use it).
    # FOOTBALL_API_KEY is needed by the World Cup tools; set its value in the
    # Render dashboard (sync: false keeps the secret out of git).
    envVars:
      - key: FOOTBALL_API_KEY
        sync: false
